<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SceretePlace: A Romeo X Julliet kind of thing.😊😊😉</title>
    <link rel="stylesheet" href="index-style.css">
</head>
<body>
    <div class='main'>
        <div class="content">
            <h1 class="site-name">SecretePlace</h1>
            <navi class="navi-buttons">
                <a class="button" id="signup-btn">Sign up</a>
                <a class="button" id="login-btn">Log in</a>
            </navi>
        </div>

        <div m-text id="m-t">
            <h1>Welcome to your SecretePlace, where you can experience true privacy.</h1>
                      
            <footer>
                <p>🤐🤐🤐 Don't talk too much bout this site, you won't see me if you try.</p>
            </footer>
        </div>
      
        <div id="auth" class="auth hidden">
            <div class="auth-content">
                <button class="close-but">&times;</button>
                
                
                <div id="login" class="authin active">
                    <h2>Log In</h2>
                    <form id="logins">
                        <input type="email" placeholder="Email" required>
                        <input type="password" placeholder="Password" required>
                        <button type="submit">Log In</button>
                    </form>
                    <p>Don't have an account? <button type="button" class="switch-process" data-target="signup">Sign Up</button></p>
                </div>
                
                
                <div id="signup" class="authin">
                    <h2>Sign Up</h2>
                    <form id="signups">
                        <input type="text" placeholder="Full Name" required>
                        <input type="email" placeholder="Email" required>
                        <input type="password" placeholder="Password" required>
                        <input type="password" placeholder="Confirm Password" required>
                        <button type="submit">Sign Up</button>
                    </form>
                    <p>Already have an account? <button type="button" class="switch-process" data-target="login">Log In</button></p>
                </div>
            </div>
        </div>
    </div>
    <script src="index-script.js"></script>
</body>
</html>
