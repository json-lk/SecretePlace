<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SceretePlace: What we call the main page ...🤔🤔🤔🤔</title>
    <link rel="stylesheet" href="mainpage_css.css">
</head>
<body>
    <div class="header">
        <div class="site-name">
            <h1>SecretePlace</h1>
        </div>
        <div class="accbut">
            <button id="theme-toggle" class="toggle-mode" type="button" aria-label="Switch to dark mode">🌙</button>
            <button class="button account-button" type="button" aria-label="Account">👤</button>
        </div>
        
    </div>
    <div class="layout">
        <navbar class="navbar">
            <nav class="navi-buttons">
                <button class="buttons" type="button" aria-label="Home">🏠</button>
                <button class="buttons" type="button" aria-label="Create">➕</button>
                <button class="buttons" type="button" aria-label="Settings">⚙️</button>
                <button class="buttons" type="button" aria-label="Help">❓</button>
                
            </nav>
            <content class="content">

            </content>
        </navbar>
        <mma class="chatroom">
            <div class="header">
                <div class="logo">Chatroom</div>
                <div class="controls">
                    <button id="settings"></button>
                    <button id="exit">✖</button>      
                </div>    
            </div>

            <div class="messages">
                <div class="message my-message">
                    <div>
                        <div class="you">you</div>
                        <div class="text">hiiii</div>
                    </div>
                </div>

                <div class="update">
                    other person just joned the group
                </div>

                <div class="message other-message">
                    <div>
                        <div class="you">other</div>
                        <div class="text">how are you</div>
                    </div>
                </div>
            </div>
            <div class="typebox">
                <input type="text" id="messages-input">
                <button id="send-message"><b>></b></button> 
            </div>
        </mma>
    </div>
    <script src="mainpage_script.js"></script>
</body>
</html>
